name: Mirror to Tangled

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    name: Push to Tangled
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TANGLED_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 tangled.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push to Tangled
        run: |
          git remote add tangled git@tangled.org:filae.site/petnames || true
          git push tangled main --force
